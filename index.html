<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartera — Dashboard IA 2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14; --surface: #13161d; --surface2: #1a1e28;
            --border: #252a38; --accent: #4f8ef7; --accent2: #7c6af7;
            --green: #3dd68c; --red: #f75f5f; --amber: #f7b94f;
            --text: #e8eaf2; --muted: #6b7280;
            --mono: 'DM Mono', monospace; --serif: 'Fraunces', serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }
        .wrapper { max-width: 1300px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }
        header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .logo h1 { font-family: var(--serif); font-size: 28px; font-weight: 300; }
        .logo h1 span { color: var(--accent); font-weight: 600; }
        .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); padding: 8px 16px; border-radius: 6px; cursor: pointer; min-width: 200px; }
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card-label { color: var(--muted); font-size: 10px; text-transform: uppercase; margin-bottom: 10px; }
        .card-value { font-family: var(--serif); font-size: 24px; }
        .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; margin-bottom: 32px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { padding: 12px 16px; text-align: left; color: var(--muted); font-size: 10px; background: var(--surface2); }
        td { padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .right { text-align: right; }
        .var-pill { padding: 4px 8px; border-radius: 20px; font-size: 11px; }
        .var-pill.pos { background: rgba(61,214,140,0.12); color: var(--green); }
        .var-pill.neg { background: rgba(247,95,95,0.12); color: var(--red); }
        .fase-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .fase-1 { background: rgba(79,142,247,0.15); color: var(--accent); }
        .fase-2 { background: rgba(61,214,140,0.15); color: var(--green); }
        .fase-3 { background: rgba(247,185,79,0.15); color: var(--amber); }
        .fase-4 { background: rgba(107,114,128,0.15); color: var(--muted); }
        .analisis-expandido { max-height: 0; overflow: hidden; transition: all 0.3s; background: rgba(79,142,247,0.05); font-size: 11px; color: #accbff; }
        .analisis-expandido.open { max-height: 200px; padding: 10px; margin-top: 5px; border: 1px solid var(--border); }
        .dip-alert { color: var(--green); font-size: 9px; font-weight: bold; display: block; margin-top: 2px; }
    </style>
    <script type="importmap"> { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } } </script>
</head>
<body>
<div class="wrapper">
    <header>
        <div class="logo"><h1>cartera<span>.</span></h1><p>Buy the Dip Edition — Gemini 2.5</p></div>
        <div class="header-right"><div id="last-update">Sin actualizar</div><button class="refresh-btn" id="refresh-btn">⟳ <span id="timer-text">Cargando...</span></button></div>
    </header>

    <div class="summary-grid">
        <div class="card"><div class="card-label">Invertido</div><div class="card-value" id="total-invested">—</div></div>
        <div class="card"><div class="card-label">Valor Actual</div><div class="card-value" id="total-value">—</div></div>
        <div class="card"><div class="card-label">P&L Total</div><div class="card-value" id="total-pnl">—</div></div>
        <div class="card"><div class="card-label">Oportunidades Dip</div><div class="card-value" id="dip-count" style="color:var(--green)">0</div></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Empresa</th>
                    <th class="right">Invertido</th>
                    <th class="right">Entrada / Max</th>
                    <th class="right">Actual</th>
                    <th class="right">RSI</th>
                    <th class="right">vs Máx</th>
                    <th class="right">P&L</th>
                    <th>Fase / Señal</th>
                    <th>Análisis Estratégico IA</th>
                </tr>
            </thead>
            <tbody id="portfolio-body"></tbody>
        </table>
    </div>
    <footer>Datos en tiempo real via Yahoo Finance & Gemini 2.5 Flash Lite</footer>
</div>

<script type="module">
import { GoogleGenerativeAI } from "@google/generative-ai";

const API_KEY = localStorage.getItem('GEMINI_KEY') || prompt("Introduce tu API Key:");
if (API_KEY) localStorage.setItem('GEMINI_KEY', API_KEY);
const genAI = new GoogleGenerativeAI(API_KEY);

// --- CARTERA CON PERSISTENCIA ---
const CARTERA_INICIAL = [
    { ticker: "MSF.DE", nombre: "Microsoft", entrada: 336.16, capital: 349.78, moneda: "€", fase: 1, sector: "Tech" },
    { ticker: "ABEA.DE", nombre: "Alphabet", entrada: 253.66, capital: 269.90, moneda: "€", fase: 1, sector: "Tech" },
    { ticker: "AMZ.DE", nombre: "Amazon", entrada: 171.54, capital: 209.93, moneda: "€", fase: 1, sector: "Tech" },
    { ticker: "ASML.AS", nombre: "ASML", entrada: 1140.10, capital: 189.84, moneda: "€", fase: 1, sector: "Semis" },
    { ticker: "TSM", nombre: "TSMC", entrada: 389.04, capital: 99.98, moneda: "$", fase: 1, sector: "Semis" },
    { ticker: "RMS.PA", nombre: "Hermès", entrada: 1619.90, capital: 397.84, moneda: "€", fase: 1, sector: "Lujo" },
    { ticker: "ITX.MC", nombre: "Inditex", entrada: 50.58, capital: 100.14, moneda: "€", fase: 1, sector: "Lujo" },
    { ticker: "NKE", nombre: "Nike", entrada: 43.40, capital: 239.88, moneda: "$", fase: 1, sector: "Consumo" },
    { ticker: "DPZ", nombre: "Domino's Pizza", entrada: 341.97, capital: 220.13, moneda: "$", fase: 1, sector: "Consumo" },
    { ticker: "ADYEN.AS", nombre: "Adyen", entrada: 899.44, capital: 255.81, moneda: "€", fase: 1, sector: "Fintech" },
    { ticker: "NOC", nombre: "Northrop Grumman", entrada: 567.89, capital: 499.92, moneda: "$", fase: 1, sector: "Defense" },
    { ticker: "MCD", nombre: "McDonalds", entrada: 283.58, capital: 300.03, moneda: "$", fase: 1, sector: "Consumo" },
    { ticker: "PRX.AS", nombre: "Prosus", entrada: 43.56, capital: 260.00, moneda: "€", fase: 1, sector: "Tech" }
];

// Cargar cartera guardada o inicializar
let miCartera = JSON.parse(localStorage.getItem('MI_CARTERA_V2')) || CARTERA_INICIAL;

window.solicitarExplicacionIA = async function(ticker, d, intentos = 0) {
    const el = document.getElementById(`razon-${ticker.replace('.','-')}`);
    if (!el || el.dataset.cargado === "true") return;
    el.innerHTML = "Analizando retroceso...";
    el.classList.add('open');

    try {
        const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash-lite" });
        const prompt = `Actúa como estratega. ${ticker} está en "${d.señal}". 
        Datos: Precio ${d.actual}, Entrada ${d.entrada}, Máximo ${d.max}, Caída desde máx: ${d.dip}%. RSI: ${d.rsi}.
        Justifica en 2 líneas por qué la señal "${d.señal}" es correcta basándote en que buscamos comprar en retrocesos del 8% en tendencia alcista. No contradigas la señal.`;

        const result = await model.generateContent(prompt);
        el.innerHTML = `<strong>[G 2.5]</strong> ${result.response.text()}`;
        el.dataset.cargado = "true";
    } catch (e) {
        if (e.message.includes('503') && intentos < 2) setTimeout(() => solicitarExplicacionIA(ticker, d, intentos + 1), 2000);
        else el.innerHTML = "Servidor ocupado. Reintenta.";
    }
};

async function fetchPrice(ticker) {
    try {
        const res = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=1mo')}`);
        const json = await res.json();
        const close = json.chart.result[0].indicators.quote[0].close.filter(p => p != null);
        return { 
            actual: json.chart.result[0].meta.regularMarketPrice,
            close: close
        };
    } catch (e) { return null; }
}

function rsi(p) {
    if (p.length < 15) return 50;
    let g = 0, l = 0;
    for (let i = 1; i < 15; i++) {
        let d = p[i] - p[i-1];
        if (d >= 0) g += d; else l -= d;
    }
    return 100 - (100 / (1 + (g/14) / (Math.abs(l/14) || 1)));
}

async function updateDashboard() {
    const body = document.getElementById('portfolio-body');
    body.innerHTML = 'Actualizando mercado...';
    let totalI = 0, totalV = 0, dips = 0;

    for (let i = 0; i < miCartera.length; i++) {
        const p = miCartera[i];
        const data = await fetchPrice(p.ticker);
        if (!data) continue;

        // LÓGICA DE MÁXIMOS Y FASES
        if (!p.maximoAlcanzado || data.actual > p.maximoAlcanzado) {
            p.maximoAlcanzado = data.actual;
        }

        const rendTotal = (data.actual - p.entrada) / p.entrada;
        const dipDesdeMax = (data.actual - p.maximoAlcanzado) / p.maximoAlcanzado;
        const currentRsi = rsi(data.close);
        
        let fase = 1, señal = "Mantener";
        // Si ha subido un 5% (tendencia) y cae un 8% desde el máximo...
        if (rendTotal > 0.05 && dipDesdeMax <= -0.075) {
            fase = 2; señal = "COMPRA (DIP)"; dips++;
        } else if (rendTotal < -0.10) {
            fase = 3; señal = "Deterioro";
        } else if (rendTotal > 0.20) {
            fase = 1; señal = "Tendencia Fuerte";
        }

        const valorAct = (p.capital / p.entrada) * data.actual;
        totalI += p.capital; totalV += valorAct;

        body.innerHTML = (i === 0 ? '' : body.innerHTML) + `
            <tr onclick="window.solicitarExplicacionIA('${p.ticker}', {actual:${data.actual}, entrada:${p.entrada}, max:${p.maximoAlcanzado}, dip:${(dipDesdeMax*100).toFixed(1)}, rsi:${currentRsi.toFixed(0)}, señal:'${señal}'})">
                <td><b style="color:var(--accent)">${p.ticker}</b><br><small>${p.nombre}</small></td>
                <td class="right">€${p.capital.toFixed(2)}</td>
                <td class="right">In: ${p.entrada.toFixed(2)}<br><small color="var(--muted)">Mx: ${p.maximoAlcanzado.toFixed(2)}</small></td>
                <td class="right"><b>${data.actual.toFixed(2)}</b></td>
                <td class="right">${currentRsi.toFixed(0)}</td>
                <td class="right" style="color:${dipDesdeMax <= -0.08 ? 'var(--green)' : 'inherit'}">${(dipDesdeMax*100).toFixed(1)}%</td>
                <td class="right"><span class="var-pill ${rendTotal >= 0 ? 'pos' : 'neg'}">${(rendTotal*100).toFixed(1)}%</span></td>
                <td><span class="fase-badge fase-${fase}">Fase ${fase}</span><br><small class="dip-alert">${fase === 2 ? '🎯 ZONA COMPRA' : ''}</small></td>
                <td>
                    <div style="cursor:pointer; font-size:10px;">${señal}. <span style="color:var(--accent)">Ver Tesis IA</span></div>
                    <div class="analisis-expandido" id="razon-${p.ticker.replace('.','-')}"></div>
                </td>
            </tr>
        `;
    }

    localStorage.setItem('MI_CARTERA_V2', JSON.stringify(miCartera));
    document.getElementById('total-invested').innerText = `€${totalI.toLocaleString()}`;
    document.getElementById('total-value').innerText = `€${totalV.toLocaleString()}`;
    document.getElementById('total-pnl').innerText = `€${(totalV - totalI).toLocaleString()}`;
    document.getElementById('dip-count').innerText = dips;
    document.getElementById('last-update').innerText = "Actualizado: " + new Date().toLocaleTimeString();
}

document.getElementById('refresh-btn').onclick = updateDashboard;
updateDashboard();
</script>
</body>
</html>
